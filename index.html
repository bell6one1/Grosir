<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Grosir Pro v5.0 (Enterprise)</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border-color: #e5e7eb;
            --input-bg: #f9fafb;
            --accent-bg: #eff6ff;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --border-color: #374151;
            --input-bg: #111827;
            --accent-bg: #1e3a8a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            min-height: 100vh;
        }

        .container, .history-container {
            width: 100%;
            max-width: 850px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .version-badge {
            background-color: #8b5cf6;
            color: white;
            font-size: 0.8rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            vertical-align: middle;
            margin-left: 0.5rem;
        }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            min-width: 150px;
        }

        label { font-weight: 600; font-size: 0.95rem; }

        input, select {
            width: 100%;
            padding: 0.85rem;
            font-size: 1.05rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-main);
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .multipliers-section {
            background-color: var(--bg-color);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        .multiplier-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            align-items: center;
        }

        .btn {
            padding: 0.85rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .btn-add {
            background-color: transparent;
            color: var(--primary);
            border: 2px dashed var(--primary);
            width: 100%;
        }

        .btn-remove { background-color: var(--danger); color: white; padding: 0.85rem; }
        .btn-calculate { background-color: var(--primary); color: white; font-size: 1.15rem; width: 100%; }
        .btn-calculate:hover { background-color: var(--primary-hover); }

        .dashboard-summary { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .summary-card {
            flex: 1;
            background-color: var(--accent-bg);
            border: 1px solid var(--primary);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }
        .summary-card h4 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .summary-card p { font-size: 1.5rem; font-weight: bold; color: var(--text-main); }

        .result-box {
            background-color: var(--input-bg);
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            display: none;
            margin-top: 1rem;
        }
        .result-box.active { display: block; }
        .result-grid { display: flex; justify-content: space-around; margin-top: 0.75rem; flex-wrap: wrap; gap: 1rem; }
        .price-item .price { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        .price-item .price.sell { color: var(--success); }

        .history-controls { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .search-bar { flex: 1; min-width: 250px; }
        .history-list { display: flex; flex-direction: column; gap: 0.75rem; max-height: 500px; overflow-y: auto; }
        .history-card {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }
        .history-info { flex: 1; }
        .history-prices { text-align: right; min-width: 160px; }
        
        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.4rem;
        }
        .badge-sembako { background-color: #ef4444; }
        .badge-minuman { background-color: #3b82f6; }
        .badge-snack { background-color: #f59e0b; }
        .badge-lainnya { background-color: #6b7280; }

        .action-btns { margin-top: 0.5rem; display: flex; gap: 0.5rem; }
        .btn-inline {
            background-color: transparent;
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-edit { color: var(--primary); border: 1px solid var(--primary); }
        .btn-edit:hover { background-color: var(--primary); color: white; }
        .btn-del { color: var(--danger); border: 1px solid var(--danger); }
        .btn-del:hover { background-color: var(--danger); color: white; }

        @media print {
            body { background-color: #ffffff; color: #000000; padding: 0; }
            .container, .history-controls, .theme-toggle, .action-btns, .multipliers-section, .btn-calculate { display: none !important; }
            .history-container { width: 100% !important; max-width: 100% !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; }
            .history-list { max-height: none !important; overflow: visible !important; }
            .history-card { border-bottom: 1px solid #000000 !important; border-radius: 0; background: transparent !important; padding: 0.75rem 0; align-items: center;}
            .summary-card { border: 1px solid #000000 !important; background: transparent !important; }
            .badge { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainForm">
        <div class="header">
            <h2>Kalkulator Grosir <span class="version-badge">v5.0-Enterprise</span></h2>
            <button class="theme-toggle" onclick="toggleTheme()">🌓 Tema</button>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <label>Nama Barang</label>
                <input type="text" id="itemName" placeholder="Contoh: Teh Sisri">
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select id="itemCategory">
                    <option value="Minuman">Minuman</option>
                    <option value="Sembako">Sembako</option>
                    <option value="Snack">Snack / Jajanan</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Harga Beli Total (Rp)</label>
                <input type="number" id="totalPrice" placeholder="Contoh: 46000" min="0">
            </div>
            <div class="form-group">
                <label>Diskon / Potongan (Rp)</label>
                <input type="number" id="discountPrice" placeholder="0" min="0" value="0">
            </div>
        </div>

        <div class="multipliers-section">
            <h3 style="margin-bottom: 0.75rem; font-size: 1.1rem;">Rincian Isi Kemasan</h3>
            <div id="multiplierContainer">
                <div class="multiplier-row">
                    <input type="number" class="qty-input" placeholder="Jumlah" min="1">
                    <input type="text" class="unit-input" placeholder="Sebutan">
                </div>
            </div>
            <button class="btn btn-add" onclick="addRow()">+ Tambah Rincian Isi</button>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Target Keuntungan (%)</label>
                <input type="number" id="marginProfit" placeholder="Contoh: 20" min="0" value="0">
            </div>
            <div class="form-group">
                <label>Pembulatan Jual</label>
                <select id="roundingType">
                    <option value="none">Tanpa Pembulatan</option>
                    <option value="100">Naik Kelipatan Rp 100</option>
                    <option value="500" selected>Naik Kelipatan Rp 500</option>
                    <option value="1000">Naik Kelipatan Rp 1.000</option>
                </select>
            </div>
        </div>

        <button class="btn btn-calculate" onclick="calculateCost()" id="btnSave">Hitung & Simpan Barang</button>

        <div id="resultBox" class="result-box">
            <h3 id="resultTitle">Hasil Perhitungan</h3>
            <p id="resultPath" style="color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem;"></p>
            <div class="result-grid">
                <div class="price-item">
                    <h4 style="color: var(--text-muted); font-size: 0.9rem;">Harga Modal / Satuan</h4>
                    <div class="price" id="resultModal">Rp 0</div>
                </div>
                <div class="price-item">
                    <h4 style="color: var(--text-muted); font-size: 0.9rem;">Saran Harga Jual</h4>
                    <div class="price sell" id="resultJual">Rp 0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="history-container">
        <div class="dashboard-summary">
            <div class="summary-card">
                <h4>Total Jenis Barang (SKU)</h4>
                <p id="summarySKU">0 Barang</p>
            </div>
            <div class="summary-card">
                <h4>Estimasi Total Pembayaran (Net)</h4>
                <p id="summarySpend" style="color: var(--success);">Rp 0</p>
            </div>
        </div>

        <div class="history-controls">
            <input type="text" id="searchHistory" class="search-bar" placeholder="🔍 Cari nama barang..." oninput="filterHistory()">
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn" style="background-color: transparent; color: var(--danger); border:1px solid var(--danger); padding:0.6rem 1rem;" onclick="clearHistory()">Hapus Semua</button>
                <button class="btn" style="background-color: #6b7280; color: white; padding:0.6rem 1rem;" onclick="window.print()">🖨️ Cetak</button>
                <button class="btn" style="background-color: var(--success); color: white; padding:0.6rem 1rem;" onclick="exportToCSV()">📥 Ekspor</button>
            </div>
        </div>

        <div class="history-list" id="historyList"></div>
    </div>

    <script>
        let historyData = JSON.parse(localStorage.getItem('grosirDataV5')) || [];
        let editingId = null;

        function toggleTheme() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function addRow(qty = '', unit = '') {
            const container = document.getElementById('multiplierContainer');
            const row = document.createElement('div');
            row.className = 'multiplier-row';
            row.innerHTML = `
                <input type="number" class="qty-input" placeholder="Jumlah" min="1" value="${qty}">
                <input type="text" class="unit-input" placeholder="Sebutan" value="${escapeHTML(unit)}">
                <button class="btn btn-remove" onclick="removeRow(this)">X</button>
            `;
            container.appendChild(row);
        }

        function removeRow(btn) { btn.parentElement.remove(); }

        // Initialize first rows if empty
        window.onload = () => {
            if(document.getElementById('multiplierContainer').children.length === 0) {
                addRow(12, 'Renceng');
                addRow(10, 'Sachet');
            }
            renderHistory();
            updateDashboard();
        };

        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        }

        function roundUpPrice(price, type) {
            if (type === 'none' || price === 0) return price;
            const factor = parseInt(type);
            return Math.ceil(price / factor) * factor;
        }

        function calculateCost() {
            const itemName = document.getElementById('itemName').value.trim() || "Barang Tanpa Nama";
            const itemCategory = document.getElementById('itemCategory').value;
            const totalPrice = parseFloat(document.getElementById('totalPrice').value);
            const discountPrice = parseFloat(document.getElementById('discountPrice').value) || 0;
            const margin = parseFloat(document.getElementById('marginProfit').value) || 0;
            const roundingType = document.getElementById('roundingType').value;
            
            // BUG FIX 1: Strict check for negative numbers and NaN
            if (!totalPrice || isNaN(totalPrice) || totalPrice < 0) {
                alert("Masukkan Harga Beli Total yang valid (lebih dari 0).");
                return;
            }
            if (discountPrice < 0 || margin < 0) {
                alert("Diskon dan Margin tidak boleh negatif.");
                return;
            }

            const rows = document.querySelectorAll('.multiplier-row');
            let totalQty = 1;
            let pathTexts = [];
            let rawMultipliers = [];
            let lastUnit = "Pcs";

            rows.forEach(row => {
                const qty = parseFloat(row.querySelector('.qty-input').value);
                const unit = row.querySelector('.unit-input').value.trim() || "Unit";
                if (qty && qty > 0) {
                    totalQty *= qty;
                    pathTexts.push(`${qty} ${escapeHTML(unit)}`);
                    rawMultipliers.push({qty, unit});
                    lastUnit = escapeHTML(unit);
                }
            });

            // BUG FIX 2: Validate empty multiplier
            if (pathTexts.length === 0) {
                alert("Harap masukkan minimal 1 rincian isi kemasan yang valid.");
                return;
            }

            const netPrice = totalPrice - discountPrice;
            const unitPrice = netPrice / totalQty;
            let rawSellingPrice = unitPrice + (unitPrice * (margin / 100));
            let finalSellingPrice = roundUpPrice(rawSellingPrice, roundingType);

            document.getElementById('resultTitle').innerText = `${escapeHTML(itemName)} (per ${lastUnit})`;
            document.getElementById('resultPath').innerText = `Total isi: ${totalQty} (${pathTexts.join(' x ')}) ${discountPrice > 0 ? '[Diskon Terpotong]' : ''}`;
            document.getElementById('resultModal').innerText = formatRupiah(unitPrice);
            document.getElementById('resultJual').innerText = formatRupiah(finalSellingPrice);
            document.getElementById('resultBox').classList.add('active');

            const record = {
                id: editingId ? editingId : Date.now(),
                date: new Date().toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' }),
                name: itemName,
                category: itemCategory,
                path: `${totalQty} (${pathTexts.join('x')})`,
                rawMultipliers: rawMultipliers, // Saved for edit feature
                totalPrice: totalPrice,
                discountPrice: discountPrice,
                netPrice: netPrice,
                modal: unitPrice,
                jual: finalSellingPrice,
                margin: margin,
                rounding: roundingType
            };
            
            if (editingId) {
                const index = historyData.findIndex(item => item.id === editingId);
                if(index !== -1) historyData[index] = record;
                editingId = null;
                document.getElementById('btnSave').innerText = "Hitung & Simpan Barang";
                document.getElementById('btnSave').style.backgroundColor = "var(--primary)";
            } else {
                historyData.unshift(record);
            }
            
            localStorage.setItem('grosirDataV5', JSON.stringify(historyData));
            
            // Clean inputs for next entry
            document.getElementById('itemName').value = '';
            document.getElementById('totalPrice').value = '';
            document.getElementById('discountPrice').value = '0';
            
            renderHistory();
            updateDashboard();
            document.getElementById('itemName').focus();
        }

        // NEW FEATURE: Edit Item
        function editItem(id) {
            const item = historyData.find(i => i.id === id);
            if(!item) return;

            editingId = id;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemCategory').value = item.category || 'Lainnya';
            document.getElementById('totalPrice').value = item.totalPrice;
            document.getElementById('discountPrice').value = item.discountPrice;
            document.getElementById('marginProfit').value = item.margin;
            document.getElementById('roundingType').value = item.rounding || '500';

            const container = document.getElementById('multiplierContainer');
            container.innerHTML = '';
            item.rawMultipliers.forEach(m => addRow(m.qty, m.unit));

            document.getElementById('btnSave').innerText = "Simpan Perubahan";
            document.getElementById('btnSave').style.backgroundColor = "var(--warning)";
            
            document.getElementById('mainForm').scrollIntoView({ behavior: 'smooth' });
        }

        function deleteItem(id) {
            if(confirm("Hapus barang ini?")) {
                historyData = historyData.filter(item => item.id !== id);
                localStorage.setItem('grosirDataV5', JSON.stringify(historyData));
                renderHistory();
                updateDashboard();
            }
        }

        function getBadgeClass(cat) {
            switch(cat) {
                case 'Sembako': return 'badge-sembako';
                case 'Minuman': return 'badge-minuman';
                case 'Snack': return 'badge-snack';
                default: return 'badge-lainnya';
            }
        }

        function updateDashboard() {
            const totalItems = historyData.length;
            const totalSpend = historyData.reduce((sum, item) => sum + item.netPrice, 0);
            document.getElementById('summarySKU').innerText = `${totalItems} Barang`;
            document.getElementById('summarySpend').innerText = formatRupiah(totalSpend);
        }

        function renderHistory(filterText = '') {
            const container = document.getElementById('historyList');
            container.innerHTML = '';
            
            const filteredData = historyData.filter(item => 
                item.name.toLowerCase().includes(filterText.toLowerCase())
            );

            if(filteredData.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding:1rem;">Tidak ada riwayat.</p>';
                return;
            }

            filteredData.forEach(item => {
                // BUG FIX 3: Prevent XSS in rendered history
                const safeName = escapeHTML(item.name);
                const safeCat = escapeHTML(item.category || 'Lainnya');
                
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="history-info">
                        <span class="badge ${getBadgeClass(safeCat)}">${safeCat}</span><br>
                        <strong style="font-size:1.05rem; color:var(--primary);">${safeName}</strong>
                        <p style="font-size:0.85rem; color:var(--text-muted);">${item.date} | Isi: ${item.path}</p>
                        <p style="font-size:0.85rem;">Beli: ${formatRupiah(item.totalPrice)} ${item.discountPrice > 0 ? `(-${formatRupiah(item.discountPrice)})` : ''}</p>
                        <div class="action-btns">
                            <button class="btn-inline btn-edit" onclick="editItem(${item.id})">✏️ Edit</button>
                            <button class="btn-inline btn-del" onclick="deleteItem(${item.id})">🗑️ Hapus</button>
                        </div>
                    </div>
                    <div class="history-prices">
                        <p style="font-size:0.9rem;">Modal: <strong>${formatRupiah(item.modal)}</strong></p>
                        <p style="color:var(--success); font-size:0.95rem;">Jual: <strong>${formatRupiah(item.jual)}</strong></p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterHistory() { renderHistory(document.getElementById('searchHistory').value); }

        function clearHistory() {
            if(confirm("Hapus seluruh daftar riwayat?")) {
                historyData = [];
                localStorage.removeItem('grosirDataV5');
                renderHistory();
                updateDashboard();
                document.getElementById('resultBox').classList.remove('active');
            }
        }

        function exportToCSV() {
            if(historyData.length === 0) return alert("Daftar kosong.");
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "Tanggal,Kategori,Nama Barang,Harga Kotor,Diskon Toko,Harga Bersih (Net),Total Isi,Modal Satuan,Margin,Harga Jual\r\n";
            
            historyData.forEach(row => {
                // Escape quotes in CSV
                const safeName = row.name.replace(/"/g, '""');
                csvContent += `"${row.date}","${row.category || ''}","${safeName}","${row.totalPrice}","${row.discountPrice}","${row.netPrice}","${row.path}","${Math.round(row.modal)}","${row.margin}%","${row.jual}"\r\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Rekap_Grosir_V5_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
